<svg width="512" height="512" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Device Sense icon</title>
  <desc>Dark chip with cyan circuit traces and magnifying glass with checkmark, representing hardware verification</desc>

  <style>
    .bg { fill: #0f1117; }
    .chip-body { fill: #1a1f2e; stroke: #00e5ff; stroke-width: 6; }
    .chip-inner { fill: #0d1220; stroke: #00e5ff; stroke-width: 3; }
    .pin { stroke: #00e5ff; stroke-width: 5; stroke-linecap: round; }
    .core { fill: #00e5ff; opacity: 0.12; }
    .core-line { stroke: #00e5ff; stroke-width: 2; opacity: 0.5; }
    .trace { stroke: #00e5ff; stroke-width: 2.5; fill: none; opacity: 0.35; }
    .lens-ring { fill: none; stroke: #ffffff; stroke-width: 14; opacity: 0.95; }
    .lens-glass { fill: #ffffff; opacity: 0.07; }
    .lens-handle { stroke: #ffffff; stroke-width: 18; stroke-linecap: round; opacity: 0.95; }
    .lens-shine { stroke: #ffffff; stroke-width: 4; stroke-linecap: round; opacity: 0.5; fill: none; }
    .scan { stroke: #00e5ff; stroke-width: 3; opacity: 0.6; }
    .dot { fill: #00e5ff; }
    .check { stroke: #00e5ff; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: 0.9; }
  </style>

  <rect class="bg" width="680" height="680" rx="120"/>

  <line class="trace" x1="160" y1="200" x2="160" y2="480"/>
  <line class="trace" x1="520" y1="200" x2="520" y2="480"/>
  <line class="trace" x1="200" y1="160" x2="480" y2="160"/>
  <line class="trace" x1="200" y1="520" x2="480" y2="520"/>

  <rect class="chip-body" x="190" y="190" width="300" height="300" rx="18"/>
  <rect class="chip-inner" x="230" y="230" width="220" height="220" rx="10"/>

  <line class="core-line" x1="230" y1="303" x2="450" y2="303"/>
  <line class="core-line" x1="230" y1="377" x2="450" y2="377"/>
  <line class="core-line" x1="303" y1="230" x2="303" y2="450"/>
  <line class="core-line" x1="377" y1="230" x2="377" y2="450"/>

  <rect class="core" x="238" y="238" width="57" height="57" rx="4"/>
  <rect class="core" x="385" y="238" width="57" height="57" rx="4"/>
  <rect class="core" x="238" y="385" width="57" height="57" rx="4"/>
  <rect class="core" x="385" y="385" width="57" height="57" rx="4"/>
  <rect class="core" x="311" y="311" width="58" height="58" rx="4" style="opacity:0.2"/>

  <line class="pin" x1="260" y1="190" x2="260" y2="155"/>
  <line class="pin" x1="300" y1="190" x2="300" y2="155"/>
  <line class="pin" x1="340" y1="190" x2="340" y2="155"/>
  <line class="pin" x1="380" y1="190" x2="380" y2="155"/>
  <line class="pin" x1="420" y1="190" x2="420" y2="155"/>

  <line class="pin" x1="260" y1="490" x2="260" y2="525"/>
  <line class="pin" x1="300" y1="490" x2="300" y2="525"/>
  <line class="pin" x1="340" y1="490" x2="340" y2="525"/>
  <line class="pin" x1="380" y1="490" x2="380" y2="525"/>
  <line class="pin" x1="420" y1="490" x2="420" y2="525"/>

  <line class="pin" x1="190" y1="260" x2="155" y2="260"/>
  <line class="pin" x1="190" y1="300" x2="155" y2="300"/>
  <line class="pin" x1="190" y1="340" x2="155" y2="340"/>
  <line class="pin" x1="190" y1="380" x2="155" y2="380"/>
  <line class="pin" x1="190" y1="420" x2="155" y2="420"/>

  <line class="pin" x1="490" y1="260" x2="525" y2="260"/>
  <line class="pin" x1="490" y1="300" x2="525" y2="300"/>
  <line class="pin" x1="490" y1="340" x2="525" y2="340"/>
  <line class="pin" x1="490" y1="380" x2="525" y2="380"/>
  <line class="pin" x1="490" y1="420" x2="525" y2="420"/>

  <line class="scan" x1="230" y1="340" x2="450" y2="340"/>
  <circle class="dot" cx="260" cy="340" r="4" opacity="0.7"/>
  <circle class="dot" cx="303" cy="340" r="4" opacity="0.7"/>
  <circle class="dot" cx="377" cy="340" r="4" opacity="0.7"/>
  <circle class="dot" cx="420" cy="340" r="4" opacity="0.7"/>

  <circle class="lens-glass" cx="442" cy="442" r="88"/>
  <circle class="lens-ring" cx="442" cy="442" r="88"/>
  <line class="lens-handle" x1="506" y1="506" x2="552" y2="552"/>
  <path class="lens-shine" d="M410 410 Q418 402 430 406"/>

  <polyline class="check" points="408,442 432,466 476,420"/>
</svg>
