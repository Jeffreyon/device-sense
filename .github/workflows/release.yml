name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:         # lets you click "Run workflow" from the Actions tab

permissions:
  contents: write            # required to create GitHub releases and upload assets

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: windows
            goos: windows
            goarch: amd64
            ext: .exe
          - os: linux
            goos: linux
            goarch: amd64
            ext: ""
          - os: macos
            goos: darwin
            goarch: amd64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Embed icon (Windows only)
        if: matrix.goos == 'windows'
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          goversioninfo -o resource_windows.syso versioninfo.json

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w" -o device-sense-${{ matrix.os }}${{ matrix.ext }} .

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: device-sense-${{ matrix.os }}
          path: device-sense-${{ matrix.os }}${{ matrix.ext }}

      - name: Upload to release (tag runs)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: device-sense-${{ matrix.os }}${{ matrix.ext }}
