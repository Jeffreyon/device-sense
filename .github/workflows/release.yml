name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: windows
            goos: windows
            goarch: amd64
            ext: .exe
          - os: linux
            goos: linux
            goarch: amd64
            ext: ""
          - os: macos
            goos: darwin
            goarch: amd64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o device-sense-${{ matrix.os }}${{ matrix.ext }} .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: device-sense-${{ matrix.os }}${{ matrix.ext }}
